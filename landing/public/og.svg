<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="HisabKitab, your pocket accountant on WhatsApp">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2EAD3"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F68B1F"/>
      <stop offset="1" stop-color="#FDB813"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(96,150)">
    <rect width="96" height="96" rx="22" fill="url(#badge)"/>
    <text x="48" y="66" font-family="Georgia, serif" font-size="46" font-weight="600" fill="#fff" text-anchor="middle">हि</text>
  </g>
  <text x="216" y="222" font-family="Georgia, serif" font-size="58" font-weight="600" fill="#111827">HisabKitab</text>
  <text x="96" y="350" font-family="Georgia, serif" font-size="64" font-weight="600" fill="#111827">Your pocket accountant,</text>
  <text x="96" y="426" font-family="Georgia, serif" font-size="64" font-weight="600" fill="#F68B1F">inside WhatsApp.</text>
  <text x="96" y="500" font-family="Arial, sans-serif" font-size="30" fill="#4B5563">Snap a bill. Get VAT ready in seconds. You approve every entry.</text>
  <text x="96" y="560" font-family="monospace" font-size="22" fill="#4B5563" letter-spacing="2">NEPAL VAT &amp; TDS · MADE IN NEPAL</text>
</svg>
